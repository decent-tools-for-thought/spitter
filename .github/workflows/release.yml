name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish. Defaults to v<project version>.
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: python -m pip install --upgrade pip && python -m pip install -e . build mypy ruff setuptools wheel

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy

      - name: Validate tests
        run: python -m unittest discover -s tests -v

      - name: Resolve version
        id: version
        run: |
          PROJECT_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          RELEASE_TAG="${{ github.event.inputs.release_tag }}"
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          elif [ -z "$RELEASE_TAG" ]; then
            RELEASE_TAG="v${PROJECT_VERSION}"
          fi
          VERSION="${RELEASE_TAG#v}"
          if [ "$VERSION" != "$PROJECT_VERSION" ]; then
            echo "Tag version $VERSION does not match pyproject version $PROJECT_VERSION" >&2
            exit 1
          fi
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release source archive
        run: |
          mkdir -p dist
          python scripts/build_release_archive.py \
            --version "${{ steps.version.outputs.version }}" \
            --output "dist/spitter-${{ steps.version.outputs.version }}-release-source.tar.gz" \
            > dist/spitter-${{ steps.version.outputs.version }}-release-source.tar.gz.sha256.tmp
          checksum="$(cat dist/spitter-${{ steps.version.outputs.version }}-release-source.tar.gz.sha256.tmp)"
          printf "%s  spitter-%s-release-source.tar.gz\n" "$checksum" "${{ steps.version.outputs.version }}" \
            > "dist/spitter-${{ steps.version.outputs.version }}-release-source.tar.gz.sha256"
          rm "dist/spitter-${{ steps.version.outputs.version }}-release-source.tar.gz.sha256.tmp"

      - name: Build Python distributions
        run: python -m build --sdist --wheel --no-isolation

      - name: Verify built distributions in fresh environments
        run: |
          python -m venv .venv-release-wheel
          . .venv-release-wheel/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "dist/spitter-${{ steps.version.outputs.version }}-py3-none-any.whl"
          python -c "import spitter"
          spitter --help > /dev/null
          spitter describe say > /dev/null
          deactivate

          python -m venv .venv-release-sdist
          . .venv-release-sdist/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --no-build-isolation --no-deps \
            "dist/spitter-${{ steps.version.outputs.version }}.tar.gz"
          python -c "import spitter"
          spitter --help > /dev/null
          spitter describe say > /dev/null

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/spitter-${{ steps.version.outputs.version }}.tar.gz
            dist/spitter-${{ steps.version.outputs.version }}-release-source.tar.gz
            dist/spitter-${{ steps.version.outputs.version }}-release-source.tar.gz.sha256
            dist/spitter-${{ steps.version.outputs.version }}-py3-none-any.whl
