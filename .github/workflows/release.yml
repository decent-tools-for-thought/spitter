name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Validate tests
        run: python -m unittest discover -s tests -v

      - name: Resolve version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [ "$VERSION" != "$PROJECT_VERSION" ]; then
            echo "Tag version $VERSION does not match pyproject version $PROJECT_VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release source archive
        run: |
          mkdir -p dist
          python scripts/build_release_archive.py \
            --version "${{ steps.version.outputs.version }}" \
            --output "dist/spitter-${{ steps.version.outputs.version }}.tar.gz" \
            > dist/spitter-${{ steps.version.outputs.version }}.tar.gz.sha256.tmp
          checksum="$(cat dist/spitter-${{ steps.version.outputs.version }}.tar.gz.sha256.tmp)"
          expected="$(python -c 'import ast, pathlib; text = pathlib.Path("PKGBUILD").read_text(); line = next(line for line in text.splitlines() if line.startswith("sha256sums=")); print(ast.literal_eval(line.split("=", 1)[1])[0])')"
          if [ "$checksum" != "$expected" ]; then
            echo "PKGBUILD checksum $expected does not match built archive $checksum" >&2
            exit 1
          fi
          printf "%s  spitter-%s.tar.gz\n" "$checksum" "${{ steps.version.outputs.version }}" \
            > "dist/spitter-${{ steps.version.outputs.version }}.tar.gz.sha256"
          rm "dist/spitter-${{ steps.version.outputs.version }}.tar.gz.sha256.tmp"

      - name: Build wheel
        run: python -m build --wheel --no-isolation

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/spitter-${{ steps.version.outputs.version }}.tar.gz
            dist/spitter-${{ steps.version.outputs.version }}.tar.gz.sha256
            dist/spitter-${{ steps.version.outputs.version }}-py3-none-any.whl
